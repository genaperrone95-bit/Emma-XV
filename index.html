<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XV de Emma</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy:       #1a2744;
    --navy-mid:   #2d3f6b;
    --cream:      #f5f0e8;
    --cream-dark: #e8e0cf;
    --gold:       #b8923a;
    --gold-light: #d4aa5a;
    --white:      #fdfaf5;
  }

  html { font-size: 16px; }

  body {
    background: var(--cream);
    color: var(--navy);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ────────────────── HERO ────────────────── */
  .hero {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 24px 100px;
    overflow: hidden;
    background: var(--white);
  }

  /* Gold frame */
  .gold-frame {
    position: absolute;
    inset: 20px;
    border: 1.5px solid var(--gold);
    pointer-events: none;
    opacity: 0.5;
  }
  .bracket {
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.9;
    z-index: 1;
  }
  .bracket.tl { top: 20px;    left: 20px;  border-width: 2px 0 0 2px; }
  .bracket.tr { top: 20px;    right: 20px; border-width: 2px 2px 0 0; }
  .bracket.bl { bottom: 20px; left: 20px;  border-width: 0 0 2px 2px; }
  .bracket.br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

  /* Leaf decorations */
  .leaf-tl { position: absolute; top: 0; left: 0; width: clamp(140px, 38vw, 260px); pointer-events: none; opacity: 0.88; }
  .leaf-br { position: absolute; bottom: 0; right: 0; width: clamp(140px, 38vw, 260px); pointer-events: none; opacity: 0.88; transform: scale(-1); }
  .leaf-tr { position: absolute; top: 0; right: 0; width: clamp(100px, 28vw, 200px); pointer-events: none; opacity: 0.6; transform: scaleX(-1); }
  .leaf-bl { position: absolute; bottom: 0; left: 0; width: clamp(100px, 28vw, 200px); pointer-events: none; opacity: 0.6; transform: scaleY(-1); }

  /* Gold dots */
  .gold-dots {
    position: absolute;
    top: 52px; right: 72px;
    pointer-events: none;
    opacity: 0.55;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .hero-eyebrow {
    font-style: italic;
    font-size: clamp(0.95rem, 2.5vw, 1.1rem);
    letter-spacing: 0.3em;
    color: var(--gold);
    text-shadow: 0 1px 3px rgba(255,255,255,0.8);
  }

  .hero-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.8rem, 14vw, 7.5rem);
    font-weight: 400;
    font-style: italic;
    color: var(--navy);
    line-height: 1;
    text-shadow: 0 2px 12px rgba(255,255,255,0.6);
  }

  .hero-xv {
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    letter-spacing: 0.55em;
    text-transform: uppercase;
    color: var(--navy-mid);
    font-weight: 400;
  }

  .ornament {
    color: var(--gold);
    font-size: 1.2rem;
    letter-spacing: 0.15em;
    margin: 4px 0;
  }

  .hero-date {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.15rem, 4vw, 1.7rem);
    font-style: italic;
    color: var(--navy);
  }

  .hero-cta {
    margin-top: 30px;
    padding: 13px 40px;
    border: 2px solid var(--navy);
    color: var(--navy);
    background: rgba(253,250,245,0.6);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(4px);
  }
  .hero-cta:hover, .hero-cta:focus {
    background: var(--navy);
    color: var(--cream);
  }

  /* ────────────────── DIVIDER ────────────────── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 32px;
    margin: 48px auto 0;
    max-width: 500px;
    width: 100%;
  }
  .divider-line { flex: 1; height: 1px; background: var(--gold); opacity: 0.45; }
  .divider-diamond {
    width: 7px; height: 7px;
    border: 1.5px solid var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* ────────────────── UPLOAD SECTION ────────────────── */
  .section {
    padding: 60px 20px 72px;
    max-width: 640px;
    margin: 0 auto;
    text-align: center;
    width: 100%;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-style: italic;
    color: var(--navy);
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .section-sub {
    font-size: clamp(0.8rem, 2.2vw, 0.95rem);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 30px;
  }

  .upload-card {
    background: var(--white);
    border: 1px solid rgba(26,39,68,0.12);
    padding: clamp(24px, 5vw, 40px) clamp(18px, 4vw, 32px);
    position: relative;
    box-shadow: 0 4px 24px rgba(26,39,68,0.06);
  }
  .upload-card::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    width: 18px; height: 18px;
    border: 2px solid var(--gold);
    border-right: none; border-bottom: none;
    opacity: 0.7;
  }
  .upload-card::after {
    content: '';
    position: absolute;
    bottom: -1px; right: -1px;
    width: 18px; height: 18px;
    border: 2px solid var(--gold);
    border-left: none; border-top: none;
    opacity: 0.7;
  }

  .name-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--navy);
    padding: 10px 4px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--navy);
    text-align: center;
    letter-spacing: 0.06em;
    outline: none;
    margin-bottom: 26px;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--gold); }
  .name-input::placeholder { color: rgba(26,39,68,0.38); font-style: italic; }

  .drop-zone {
    border: 1.5px dashed rgba(26,39,68,0.28);
    padding: clamp(28px, 6vw, 40px) 16px;
    cursor: pointer;
    transition: all 0.28s;
    position: relative;
    overflow: hidden;
    background: var(--cream);
    border-radius: 2px;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--navy);
    background: var(--cream-dark);
  }
  .drop-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
    font-size: 16px; /* prevents iOS zoom */
  }
  .drop-icon { font-size: 2rem; margin-bottom: 10px; }
  .drop-text {
    font-size: 1.05rem;
    color: var(--navy);
    font-style: italic;
    opacity: 0.75;
  }
  .drop-hint {
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--navy);
    opacity: 0.4;
    margin-top: 5px;
  }

  #preview-wrap { display: none; margin-top: 16px; }
  #preview-wrap img {
    max-width: 100%;
    max-height: 260px;
    object-fit: contain;
    border: 1px solid rgba(26,39,68,0.1);
  }

  .btn-primary {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    background: var(--navy);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: background 0.28s;
  }
  .btn-primary:hover:not(:disabled) { background: var(--navy-mid); }
  .btn-primary:disabled { opacity: 0.42; cursor: default; }

  .upload-status {
    margin-top: 12px;
    font-style: italic;
    color: var(--gold);
    font-size: 1rem;
    min-height: 22px;
  }

  /* ────────────────── GALLERY ────────────────── */
  .gallery-section {
    background: var(--navy);
    padding: 60px 20px 80px;
    text-align: center;
  }
  .gallery-section .section-title { color: var(--white); }
  .gallery-section .section-sub   { color: var(--gold-light); }

  .gallery-count {
    font-size: 0.8rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(253,250,245,0.4);
    margin-bottom: 28px;
  }

  /* Empty state — centrado */
  .gallery-empty-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 180px;
    width: 100%;
  }
  .gallery-empty {
    color: rgba(253,250,245,0.45);
    font-style: italic;
    font-size: clamp(1rem, 3vw, 1.15rem);
    letter-spacing: 0.05em;
    text-align: center;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(clamp(130px, 28vw, 190px), 1fr));
    gap: 10px;
    max-width: 820px;
    margin: 0 auto;
  }

  .gallery-item {
    position: relative;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    background: rgba(255,255,255,0.06);
    cursor: pointer;
  }
  .gallery-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.38s ease;
  }
  .gallery-item:hover img { transform: scale(1.06); }
  .gallery-item .photo-name {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(10,16,40,0.72));
    color: #fdfaf5;
    font-style: italic;
    font-size: 0.82rem;
    padding: 18px 8px 6px;
    text-align: center;
  }
  .btn-delete {
    position: absolute;
    top: 6px; right: 6px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(10,16,40,0.7);
    border: none;
    color: #fdfaf5;
    font-size: 1rem;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .gallery-item:hover .btn-delete { display: flex; }

  /* ────────────────── ADMIN ────────────────── */
  .admin-section {
    background: var(--navy);
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 28px 20px;
    text-align: center;
  }
  .btn-admin {
    background: transparent;
    border: 1px solid rgba(253,250,245,0.22);
    color: rgba(253,250,245,0.42);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.82rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 8px 22px;
    cursor: pointer;
    transition: all 0.28s;
  }
  .btn-admin:hover {
    border-color: rgba(253,250,245,0.5);
    color: var(--white);
  }

  /* ────────────────── FOOTER ────────────────── */
  footer {
    background: #0d1220;
    color: rgba(253,250,245,0.28);
    text-align: center;
    padding: 22px 20px;
    font-size: 0.78rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  /* ────────────────── MODAL ────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,14,30,0.84);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    padding: 40px clamp(20px, 5vw, 36px);
    max-width: 380px;
    width: 100%;
    text-align: center;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-style: italic;
    color: var(--navy);
    margin-bottom: 20px;
  }
  .modal input[type=password] {
    width: 100%;
    border: none;
    border-bottom: 1.5px solid var(--navy);
    background: transparent;
    padding: 10px 4px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    text-align: center;
    outline: none;
    color: var(--navy);
    margin-bottom: 22px;
    font-size: 16px; /* prevents iOS zoom */
  }
  .modal-buttons { display: flex; gap: 10px; }
  .modal-buttons button {
    flex: 1;
    padding: 11px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.92rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border: 1.5px solid var(--navy);
    cursor: pointer;
    transition: all 0.25s;
  }
  .btn-confirm { background: var(--navy); color: var(--cream); }
  .btn-cancel  { background: transparent; color: var(--navy); }
  .btn-cancel:hover { background: var(--cream-dark); }
  .modal-error {
    color: #993333;
    font-style: italic;
    font-size: 0.9rem;
    margin-top: 10px;
    min-height: 18px;
  }

  /* ────────────────── LIGHTBOX ────────────────── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,10,22,0.94);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: min(92vw, 900px);
    max-height: 88svh;
    object-fit: contain;
    border: 1px solid rgba(253,250,245,0.08);
    display: block;
  }
  .lightbox-close {
    position: absolute;
    top: 16px; right: 20px;
    color: rgba(253,250,245,0.7);
    font-size: 2rem;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
    padding: 4px 8px;
  }
  .lightbox-name {
    position: absolute;
    bottom: 18px;
    color: rgba(253,250,245,0.55);
    font-style: italic;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-align: center;
    width: 100%;
  }

  /* ────────────────── RESPONSIVE ────────────────── */
  @media (max-width: 480px) {
    .hero { padding: 70px 16px 90px; }
    .gold-frame { inset: 12px; }
    .bracket.tl { top: 12px; left: 12px; }
    .bracket.tr { top: 12px; right: 12px; }
    .bracket.bl { bottom: 12px; left: 12px; }
    .bracket.br { bottom: 12px; right: 12px; }
    .section { padding: 48px 16px 60px; }
    .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .upload-card { padding: 22px 16px; }
    .hero-cta { padding: 12px 28px; font-size: 0.88rem; letter-spacing: 0.22em; }
  }

  @media (min-width: 768px) {
    .gallery-grid { grid-template-columns: repeat(3, 1fr); }
    .section { padding: 72px 32px 90px; }
  }

  @media (min-width: 1024px) {
    .gallery-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; }
  }
</style>
</head>
<body>

<!-- ────── HERO ────── -->
<section class="hero">

  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>
  <div class="gold-frame"></div>

  <!-- Leaves TL -->
  <div class="leaf-tl">
    <svg viewBox="0 0 280 320" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <ellipse cx="55"  cy="38"  rx="40" ry="16" fill="#1a2744" opacity="0.22" transform="rotate(-38,55,38)"/>
      <ellipse cx="92"  cy="22"  rx="28" ry="11" fill="#2d3f6b" opacity="0.17" transform="rotate(-58,92,22)"/>
      <ellipse cx="28"  cy="85"  rx="46" ry="15" fill="#1a2744" opacity="0.18" transform="rotate(-12,28,85)"/>
      <ellipse cx="78"  cy="68"  rx="32" ry="12" fill="#2d3f6b" opacity="0.15" transform="rotate(-42,78,68)"/>
      <ellipse cx="45"  cy="130" rx="44" ry="14" fill="#1a2744" opacity="0.14" transform="rotate(6,45,130)"/>
      <ellipse cx="118" cy="52"  rx="24" ry="9"  fill="#2d3f6b" opacity="0.12" transform="rotate(-62,118,52)"/>
      <ellipse cx="15"  cy="160" rx="38" ry="12" fill="#1a2744" opacity="0.12" transform="rotate(-8,15,160)"/>
      <line x1="0"  y1="55"  x2="140" y2="16" stroke="#1a2744" stroke-width="1.3" opacity="0.22"/>
      <line x1="0"  y1="110" x2="115" y2="55" stroke="#1a2744" stroke-width="0.9" opacity="0.18"/>
      <line x1="15" y1="158" x2="95"  y2="100" stroke="#1a2744" stroke-width="0.8" opacity="0.14"/>
      <line x1="5"  y1="200" x2="75"  y2="145" stroke="#1a2744" stroke-width="0.7" opacity="0.10"/>
    </svg>
  </div>

  <!-- Leaves BR -->
  <div class="leaf-br">
    <svg viewBox="0 0 280 320" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <ellipse cx="55"  cy="38"  rx="40" ry="16" fill="#1a2744" opacity="0.22" transform="rotate(-38,55,38)"/>
      <ellipse cx="92"  cy="22"  rx="28" ry="11" fill="#2d3f6b" opacity="0.17" transform="rotate(-58,92,22)"/>
      <ellipse cx="28"  cy="85"  rx="46" ry="15" fill="#1a2744" opacity="0.18" transform="rotate(-12,28,85)"/>
      <ellipse cx="78"  cy="68"  rx="32" ry="12" fill="#2d3f6b" opacity="0.15" transform="rotate(-42,78,68)"/>
      <ellipse cx="45"  cy="130" rx="44" ry="14" fill="#1a2744" opacity="0.14" transform="rotate(6,45,130)"/>
      <ellipse cx="118" cy="52"  rx="24" ry="9"  fill="#2d3f6b" opacity="0.12" transform="rotate(-62,118,52)"/>
      <line x1="0"  y1="55"  x2="140" y2="16" stroke="#1a2744" stroke-width="1.3" opacity="0.22"/>
      <line x1="0"  y1="110" x2="115" y2="55" stroke="#1a2744" stroke-width="0.9" opacity="0.18"/>
      <line x1="15" y1="158" x2="95"  y2="100" stroke="#1a2744" stroke-width="0.8" opacity="0.14"/>
    </svg>
  </div>

  <!-- Leaves TR (smaller, subtle) -->
  <div class="leaf-tr">
    <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <ellipse cx="40"  cy="30"  rx="32" ry="12" fill="#1a2744" opacity="0.14" transform="rotate(-30,40,30)"/>
      <ellipse cx="70"  cy="18"  rx="22" ry="8"  fill="#2d3f6b" opacity="0.10" transform="rotate(-50,70,18)"/>
      <ellipse cx="20"  cy="70"  rx="36" ry="11" fill="#1a2744" opacity="0.12" transform="rotate(-10,20,70)"/>
      <line x1="0" y1="45" x2="110" y2="12" stroke="#1a2744" stroke-width="0.9" opacity="0.15"/>
      <line x1="0" y1="85" x2="90"  y2="45" stroke="#1a2744" stroke-width="0.7" opacity="0.12"/>
    </svg>
  </div>

  <!-- Gold dots -->
  <svg class="gold-dots" width="48" height="58" viewBox="0 0 48 58" aria-hidden="true">
    <circle cx="10" cy="10"  r="2.5" fill="#b8923a"/>
    <circle cx="26" cy="20"  r="1.8" fill="#b8923a"/>
    <circle cx="40" cy="7"   r="2"   fill="#b8923a"/>
    <circle cx="14" cy="36"  r="1.5" fill="#b8923a"/>
    <circle cx="38" cy="42"  r="2.2" fill="#b8923a"/>
    <circle cx="22" cy="50"  r="1.3" fill="#b8923a"/>
  </svg>

  <div class="hero-content">
    <p class="hero-eyebrow">Mis quince años</p>
    <h1 class="hero-name">Emma</h1>
    <p class="hero-xv">XV Años</p>
    <div class="ornament">✦ &nbsp;✦ &nbsp;✦</div>
    <p class="hero-date">Sábado · ?? de ??? de 2025</p>
    <button class="hero-cta" onclick="document.getElementById('upload-section').scrollIntoView({behavior:'smooth'})">
      Compartí tu foto
    </button>
  </div>
</section>

<!-- ────── UPLOAD ────── -->
<section class="section" id="upload-section">
  <h2 class="section-title">Compartí este momento</h2>
  <p class="section-sub">Subí tu foto de esta noche</p>

  <div class="upload-card">
    <input
      class="name-input"
      id="name-input"
      type="text"
      placeholder="Tu nombre"
      maxlength="40"
      autocomplete="name"
    />

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*">
      <div class="drop-icon">📷</div>
      <p class="drop-text">Elegí o arrastrá una foto</p>
      <p class="drop-hint">desde tu celular o compu</p>
    </div>

    <div id="preview-wrap">
      <img id="preview-img" src="" alt="preview">
    </div>

    <button class="btn-primary" id="btn-upload" disabled onclick="uploadPhoto()">
      Compartir foto
    </button>
    <p class="upload-status" id="upload-status" aria-live="polite"></p>
  </div>
</section>

<!-- Divider -->
<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-diamond"></div>
  <div class="divider-line"></div>
</div>

<!-- ────── GALLERY ────── -->
<section class="gallery-section" id="gallery-section">
  <h2 class="section-title">Galería de la noche</h2>
  <p class="section-sub">Los recuerdos de Emma</p>
  <p class="gallery-count" id="gallery-count">0 fotos</p>
  <div id="gallery-container"></div>
</section>

<!-- Admin -->
<section class="admin-section">
  <button class="btn-admin" onclick="openAdmin()">Modo administrador</button>
</section>

<footer>Con amor · XV de Emma</footer>

<!-- Admin Modal -->
<div class="modal-overlay" id="admin-modal" role="dialog" aria-modal="true" aria-label="Administrador">
  <div class="modal">
    <p class="modal-title">Administrador</p>
    <input type="password" id="admin-pass" placeholder="Contraseña" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') checkAdmin()">
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeAdmin()">Cancelar</button>
      <button class="btn-confirm" onclick="checkAdmin()">Ingresar</button>
    </div>
    <p class="modal-error" id="admin-error" role="alert"></p>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Cerrar">×</button>
  <img id="lightbox-img" src="" alt="">
  <p class="lightbox-name" id="lightbox-name"></p>
</div>

<script>
  /* ── CONFIG ── */
  const ADMIN_PASSWORD = 'emma2025'; /* ← cambiá esto */
  const STORAGE_KEY    = 'emma_xv_photos_v2';

  /* ── STATE ── */
  let isAdmin      = false;
  let photos       = loadPhotos();
  let selectedFile = null;

  /* ── STORAGE ── */
  function loadPhotos() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function savePhotos() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(photos)); }
    catch(e) { console.warn('Storage full', e); }
  }

  /* ── FILE SELECTION ── */
  const fileInput   = document.getElementById('file-input');
  const dropZone    = document.getElementById('drop-zone');
  const preview     = document.getElementById('preview-img');
  const previewWrap = document.getElementById('preview-wrap');
  const btnUpload   = document.getElementById('btn-upload');

  fileInput.addEventListener('change', () => {
    const f = fileInput.files[0];
    if (!f || !f.type.startsWith('image/')) return;
    selectedFile = f;
    preview.src = URL.createObjectURL(f);
    previewWrap.style.display = 'block';
    checkReady();
  });

  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (!f || !f.type.startsWith('image/')) return;
    selectedFile = f;
    preview.src = URL.createObjectURL(f);
    previewWrap.style.display = 'block';
    checkReady();
  });

  document.getElementById('name-input').addEventListener('input', checkReady);

  function checkReady() {
    const hasName = document.getElementById('name-input').value.trim().length > 0;
    btnUpload.disabled = !(selectedFile && hasName);
  }

  /* ── UPLOAD ── */
  function uploadPhoto() {
    if (!selectedFile) return;
    const name   = document.getElementById('name-input').value.trim();
    const status = document.getElementById('upload-status');
    status.textContent = 'Subiendo…';
    btnUpload.disabled  = true;

    const reader = new FileReader();
    reader.onload = () => {
      photos.push({ id: Date.now(), name, src: reader.result });
      savePhotos();
      renderGallery();
      status.textContent = '¡Foto compartida con éxito! 🌸';
      selectedFile = null;
      fileInput.value = '';
      previewWrap.style.display = 'none';
      preview.src = '';
      document.getElementById('name-input').value = '';
      btnUpload.disabled = true;
      setTimeout(() => { status.textContent = ''; }, 4000);
      document.getElementById('gallery-section').scrollIntoView({ behavior: 'smooth' });
    };
    reader.readAsDataURL(selectedFile);
  }

  /* ── GALLERY ── */
  function renderGallery() {
    const container = document.getElementById('gallery-container');
    const count     = document.getElementById('gallery-count');
    count.textContent = photos.length + (photos.length === 1 ? ' foto' : ' fotos');

    if (photos.length === 0) {
      container.innerHTML = `
        <div class="gallery-empty-wrap">
          <p class="gallery-empty">Las fotos de la noche aparecerán aquí ✨</p>
        </div>`;
      return;
    }

    container.innerHTML = `<div class="gallery-grid">${
      photos.map(p => `
        <div class="gallery-item" onclick="openLightbox(${p.id})">
          <img src="${p.src}" alt="${escHtml(p.name)}" loading="lazy">
          <div class="photo-name">${escHtml(p.name)}</div>
          ${isAdmin ? `<button class="btn-delete" onclick="event.stopPropagation();deletePhoto(${p.id})" aria-label="Eliminar foto de ${escHtml(p.name)}">×</button>` : ''}
        </div>`).join('')
    }</div>`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function deletePhoto(id) {
    if (!confirm('¿Eliminar esta foto?')) return;
    photos = photos.filter(p => p.id !== id);
    savePhotos();
    renderGallery();
  }

  /* ── LIGHTBOX ── */
  function openLightbox(id) {
    const p = photos.find(x => x.id === id);
    if (!p) return;
    document.getElementById('lightbox-img').src  = p.src;
    document.getElementById('lightbox-name').textContent = p.name;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeLightbox();
      closeAdmin();
    }
  });

  /* ── ADMIN ── */
  function openAdmin() {
    document.getElementById('admin-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('admin-pass').focus(), 100);
  }
  function closeAdmin() {
    document.getElementById('admin-modal').classList.remove('open');
    document.getElementById('admin-pass').value = '';
    document.getElementById('admin-error').textContent = '';
    document.body.style.overflow = '';
  }
  function checkAdmin() {
    const pass = document.getElementById('admin-pass').value;
    if (pass === ADMIN_PASSWORD) {
      isAdmin = true;
      closeAdmin();
      renderGallery();
    } else {
      document.getElementById('admin-error').textContent = 'Contraseña incorrecta';
      document.getElementById('admin-pass').value = '';
      document.getElementById('admin-pass').focus();
    }
  }

  /* ── INIT ── */
  renderGallery();
</script>
</body>
</html>
